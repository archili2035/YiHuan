<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>异环阵容养成记录</title>
  <style>
    :root {
      --bg: #f4efe7;
      --panel: rgba(255, 250, 242, 0.92);
      --ink: #282119;
      --muted: #7a6b5b;
      --line: rgba(72, 52, 31, 0.14);
      --brand: #c86631;
      --brand-dark: #7b4223;
      --gold: #b98218;
      --purple: #7850b7;
      --warn: #b56d14;
      --danger: #b74735;
      --ok: #277d5d;
      --shadow: 0 22px 64px rgba(57, 39, 18, 0.13);
      --radius-xl: 30px;
      --radius-lg: 22px;
      --radius-md: 14px;
      --radius-sm: 10px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", Arial, sans-serif;
      background:
        radial-gradient(circle at 10% 8%, rgba(255, 213, 139, 0.45), transparent 30%),
        radial-gradient(circle at 90% 6%, rgba(195, 102, 49, 0.16), transparent 28%),
        linear-gradient(135deg, #f9f2e7 0%, #ede0cf 52%, #fbf7ef 100%);
    }

    .page {
      width: min(1240px, calc(100% - 40px));
      margin: 0 auto;
      padding: 42px 0 56px;
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: 34px;
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background:
        linear-gradient(135deg, rgba(255, 250, 242, 0.98), rgba(246, 229, 204, 0.88)),
        repeating-linear-gradient(45deg, rgba(200, 102, 49, 0.06) 0 1px, transparent 1px 16px);
      box-shadow: var(--shadow);
    }

    .hero::before,
    .hero::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      pointer-events: none;
    }

    .hero::before {
      right: -90px;
      top: -120px;
      width: 300px;
      height: 300px;
      background: rgba(200, 102, 49, 0.13);
    }

    .hero::after {
      right: 70px;
      bottom: -80px;
      width: 180px;
      height: 180px;
      background: rgba(39, 125, 93, 0.10);
    }

    .eyebrow {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      padding: 7px 12px;
      border-radius: 999px;
      color: var(--brand-dark);
      background: rgba(200, 102, 49, 0.12);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.08em;
    }

    h1 {
      position: relative;
      z-index: 1;
      margin: 18px 0 10px;
      font-size: clamp(34px, 4.4vw, 58px);
      line-height: 1.04;
      letter-spacing: -0.05em;
    }

    .hero-desc {
      position: relative;
      z-index: 1;
      max-width: 850px;
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.85;
    }

    .stats {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-top: 26px;
    }

    .stat {
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: rgba(255, 250, 242, 0.72);
    }

    .stat strong {
      display: block;
      color: var(--brand-dark);
      font-size: 30px;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .stat span {
      display: block;
      margin-top: 9px;
      color: var(--muted);
      font-size: 13px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin: 24px 0 0;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: rgba(255, 250, 242, 0.62);
    }

    .legend { display: flex; flex-wrap: wrap; gap: 8px; }
    .legend .pill { background: rgba(255, 255, 255, 0.56); }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
      user-select: none;
    }

    .toggle input { width: 16px; height: 16px; accent-color: var(--brand); }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin: 34px 0 16px;
    }

    .section-head h2 {
      margin: 0;
      font-size: 30px;
      letter-spacing: -0.04em;
    }

    .section-head p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .team-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .role-card {
      display: flex;
      flex-direction: column;
      min-height: 100%;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: var(--panel);
      box-shadow: 0 14px 36px rgba(57, 39, 18, 0.08);
    }

    .role-card.has-transition { border-color: rgba(120, 80, 183, 0.22); }
    .role-card.has-warning {
      border-color: rgba(181, 109, 20, 0.32);
      background: linear-gradient(180deg, #fffaf2, #fff4e4);
    }
    .role-card.has-danger { border-color: rgba(183, 71, 53, 0.30); }

    .role-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 14px;
    }

    .role-title { min-width: 0; }
    .role-title h3 { margin: 0; font-size: 24px; line-height: 1.2; letter-spacing: -0.03em; }
    .role-title .sub { margin-top: 6px; color: var(--muted); font-size: 13px; }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 28px;
      padding: 6px 10px;
      border: 1px solid transparent;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .attr-ling { color: #247456; background: rgba(39, 125, 93, 0.12); border-color: rgba(39, 125, 93, 0.22); }
    .attr-guang { color: #936318; background: rgba(216, 161, 54, 0.17); border-color: rgba(216, 161, 54, 0.28); }
    .attr-zhou { color: #6d4aa0; background: rgba(109, 74, 160, 0.13); border-color: rgba(109, 74, 160, 0.22); }
    .attr-xiang { color: #24758b; background: rgba(36, 117, 139, 0.13); border-color: rgba(36, 117, 139, 0.22); }
    .pill-gold { color: var(--gold); background: rgba(185, 130, 24, 0.12); border-color: rgba(185, 130, 24, 0.24); }
    .pill-purple { color: var(--purple); background: rgba(120, 80, 183, 0.12); border-color: rgba(120, 80, 183, 0.22); }
    .pill-warn { color: var(--warn); background: rgba(181, 109, 20, 0.12); border-color: rgba(181, 109, 20, 0.22); }
    .pill-danger { color: var(--danger); background: rgba(183, 71, 53, 0.11); border-color: rgba(183, 71, 53, 0.20); }
    .pill-ok { color: var(--ok); background: rgba(39, 125, 93, 0.11); border-color: rgba(39, 125, 93, 0.20); }

    .key-stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }

    .key-stat {
      padding: 10px 12px;
      border: 1px solid rgba(72, 52, 31, 0.10);
      border-radius: var(--radius-sm);
      background: rgba(255, 255, 255, 0.58);
    }

    .key-stat b { display: block; color: var(--brand-dark); font-size: 15px; line-height: 1.25; }
    .key-stat span { display: block; margin-top: 4px; color: var(--muted); font-size: 11px; font-weight: 800; letter-spacing: 0.04em; }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 2px;
    }

    .info-box,
    .driver-box {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.54);
    }

    .driver-box { margin-top: 12px; }

    .info-box h4,
    .driver-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 0 0 10px;
      color: var(--brand-dark);
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .list {
      display: grid;
      gap: 7px;
      margin: 0;
      padding: 0;
      list-style: none;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .list b { color: var(--ink); font-weight: 800; }

    .quality-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }

    .quality {
      padding: 10px;
      border-radius: var(--radius-sm);
      border: 1px solid rgba(72, 52, 31, 0.10);
      background: rgba(255, 255, 255, 0.58);
    }

    .quality b { display: block; font-size: 18px; line-height: 1; }
    .quality span { display: block; margin-top: 5px; color: var(--muted); font-size: 11px; font-weight: 800; }
    .quality.gold b { color: var(--gold); }
    .quality.purple b { color: var(--purple); }
    .quality.missing b { color: var(--warn); }
    .quality.lines b { color: var(--brand-dark); }

    .driver-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .driver-item {
      border: 1px solid rgba(72, 52, 31, 0.10);
      border-radius: 13px;
      background: rgba(255, 250, 242, 0.68);
      overflow: hidden;
    }

    .driver-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
    }

    .driver-name {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      font-weight: 800;
      color: #4f3c2d;
    }

    .driver-lines {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 0 12px 10px;
    }

    .line-chip {
      padding: 5px 8px;
      border-radius: 999px;
      color: #5f4a37;
      background: rgba(72, 52, 31, 0.07);
      font-size: 12px;
      font-weight: 700;
    }

    .driver-group-title {
      margin: 12px 0 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.08em;
    }

    .todo {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed rgba(72, 52, 31, 0.20);
    }

    .todo-title { margin: 0 0 8px; color: var(--muted); font-size: 12px; font-weight: 800; letter-spacing: 0.08em; }

    .chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 7px 10px;
      border: 1px solid rgba(72, 52, 31, 0.10);
      border-radius: 999px;
      color: #554331;
      background: #f4eadb;
      font-size: 12px;
      font-weight: 800;
    }

    .issue-panel {
      display: grid;
      grid-template-columns: 1fr 1.4fr 1fr;
      gap: 18px;
      margin-top: 18px;
    }

    .issue-card {
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: rgba(255, 250, 242, 0.76);
      box-shadow: 0 10px 30px rgba(57, 39, 18, 0.06);
    }

    .issue-card h3 { margin: 0 0 12px; font-size: 18px; letter-spacing: -0.02em; }
    .issue-list { display: grid; gap: 10px; margin: 0; padding: 0; list-style: none; color: var(--muted); font-size: 14px; line-height: 1.55; }
    .issue-list li { padding: 10px 12px; border-radius: var(--radius-sm); background: rgba(255, 255, 255, 0.55); border: 1px solid rgba(72, 52, 31, 0.09); }
    .issue-list b { color: var(--ink); }



    .matrix-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      overflow: hidden;
      border: 1px solid rgba(72, 52, 31, 0.12);
      border-radius: var(--radius-sm);
      background: rgba(255, 255, 255, 0.50);
      font-size: 13px;
    }

    .matrix-table th,
    .matrix-table td {
      padding: 9px 10px;
      border-bottom: 1px solid rgba(72, 52, 31, 0.09);
      text-align: center;
      white-space: nowrap;
    }

    .matrix-table th:first-child,
    .matrix-table td:first-child {
      text-align: left;
      font-weight: 800;
      color: var(--ink);
    }

    .matrix-table th {
      color: var(--brand-dark);
      background: rgba(200, 102, 49, 0.08);
      font-weight: 900;
    }

    .matrix-table tr:last-child td { border-bottom: none; }

    .matrix-table td.has-value {
      color: var(--brand-dark);
      font-weight: 900;
      background: rgba(185, 130, 24, 0.08);
    }

    .recommend-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .recommend-list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid rgba(72, 52, 31, 0.09);
      background: rgba(255, 255, 255, 0.55);
      color: var(--muted);
      font-size: 13px;
    }

    .recommend-list b { color: var(--ink); }

    .rank-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: 999px;
      color: #fffaf2;
      background: var(--brand);
      font-size: 12px;
      font-weight: 900;
      flex: 0 0 auto;
    }

    .maintenance {
      margin-top: 34px;
      padding: 22px;
      border: 1px dashed rgba(123, 66, 35, 0.36);
      border-radius: var(--radius-lg);
      background: rgba(255, 250, 242, 0.70);
      color: var(--muted);
      line-height: 1.8;
    }

    .maintenance b { color: var(--ink); }
    .hide-clean .role-card:not(.has-transition):not(.has-warning):not(.has-danger) { display: none; }

    @media (max-width: 980px) {
      .stats, .team-grid, .issue-panel { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 760px) {
      .page { width: min(100% - 24px, 1240px); padding: 22px 0 38px; }
      .hero { padding: 24px; }
      .stats, .team-grid, .info-grid, .issue-panel, .key-stats, .quality-grid { grid-template-columns: 1fr; }
      .section-head, .toolbar { align-items: flex-start; flex-direction: column; }
      .driver-main { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <main class="page" id="page">
    <section class="hero">

      <h1>核心阵容搭配</h1>
      <p class="hero-desc">本页面基于 <b>阵容.md</b> 更新。当前记录重点已经从“是否暂缺”推进到“驱动块品质与词条质量”：金色代表较优基底，紫色代表过渡位，词条详情用于后续判断替换优先级。</p>
      <div class="stats" id="stats"></div>
      <div class="toolbar">
        <div class="legend">
          <span class="pill pill-gold">金色驱动</span>
          <span class="pill pill-purple">紫色过渡</span>
          <span class="pill pill-warn">空幕暂缺</span>
          <span class="pill pill-danger">主属性异常</span>
        </div>
        <label class="toggle"><input type="checkbox" id="onlyIssues" /> 只看紫色过渡 / 空幕异常角色</label>
      </div>
    </section>

    <section class="issue-panel" id="issuePanel"></section>

    <section>
      <div class="section-head">
        <h2>1队</h2>
        <p>娜娜莉、九原、零（主角）、浔</p>
      </div>
      <div class="team-grid" id="team1"></div>
    </section>

    <section>
      <div class="section-head">

        <p>小吱、哈索尔、早雾、薄荷</p>
      </div>
      <div class="team-grid" id="team2"></div>
    </section>

    <section class="maintenance">
      <b>维护说明：</b>后续新增或修改角色数据时，先更新 <b>阵容.md</b>。驱动块建议继续使用固定格式：<b>形状 × 数量（品质）</b>，词条作为该条目的子项。HTML 会按金色、紫色、暂缺和词条数量自动汇总展示。
    </section>
  </main>

    const allRoles = teams.flatMap(team => team.roles.map(role => ({ ...role, team: team.name })));

    function drivers(role) {
      return [...role.required.map(item => ({ ...item, group: "必备" })), ...role.extra.map(item => ({ ...item, group: "补充" }))];
    }

    function qualityStats(role) {
      const stats = { gold: 0, purple: 0, missing: 0, lines: 0, total: 0 };
      drivers(role).forEach(item => {
        stats.total += 1;
        if (item.missing || item.quality === "暂缺") stats.missing += 1;
        if (item.quality === "金") stats.gold += 1;
        if (item.quality === "紫") stats.purple += 1;
        if (item.lines) stats.lines += item.lines.length;
      });
      return stats;
    }

    function hasIssue(role) {
      const stats = qualityStats(role);
      return stats.purple > 0 || stats.missing > 0 || role.curtain.missing || role.curtain.mainIssue;
    }

    function statusPill(role) {
      const stats = qualityStats(role);
      if (stats.missing > 0) return `<span class="pill pill-warn">仍有暂缺</span>`;
      if (role.curtain.mainIssue) return `<span class="pill pill-danger">主属性异常</span>`;
      if (role.curtain.missing) return `<span class="pill pill-warn">空幕暂缺</span>`;
      if (stats.purple > 0) return `<span class="pill pill-purple">紫色过渡</span>`;
      return `<span class="pill pill-ok">驱动成型</span>`;
    }

    function renderStats() {
      const totalDrivers = allRoles.reduce((sum, role) => sum + qualityStats(role).total, 0);
      const goldDrivers = allRoles.reduce((sum, role) => sum + qualityStats(role).gold, 0);
      const purpleDrivers = allRoles.reduce((sum, role) => sum + qualityStats(role).purple, 0);
      const lineCount = allRoles.reduce((sum, role) => sum + qualityStats(role).lines, 0);
      const stats = [
        [allRoles.length, "已记录角色"],
        [totalDrivers, "驱动块条目"],
        [`${goldDrivers}/${purpleDrivers}`, "金色 / 紫色"],
        [lineCount, "金色驱动有效属性"]
      ];
      document.getElementById("stats").innerHTML = stats.map(([num, label]) => `
        <div class="stat"><strong>${num}</strong><span>${label}</span></div>
      `).join("");
    }

    function renderIssues() {
      const nonGoldMap = new Map();
      const goldLineMap = new Map();
      allRoles.forEach(role => {
        drivers(role).forEach(item => {
          const count = item.count || 1;
          if (item.quality === "金") {
            const lineCount = Math.min((item.lines || []).length, 4);
            const current = goldLineMap.get(item.name) || [0, 0, 0, 0, 0];
            current[lineCount] += count;
            goldLineMap.set(item.name, current);
            return;
          }
          const current = nonGoldMap.get(item.name) || { total: 0, purple: 0, missing: 0 };
          current.total += count;
          if (item.quality === "紫") current.purple += count;
          if (item.missing || item.quality === "暂缺") current.missing += count;
          nonGoldMap.set(item.name, current);
        });
      });

      const shapeSet = new Set([...nonGoldMap.keys(), ...goldLineMap.keys()]);
      const nonGoldShapes = [...nonGoldMap.entries()].sort((a, b) => b[1].total - a[1].total || a[0].localeCompare(b[0], "zh-Hans-CN"));
      const goldLineShapes = [...shapeSet].sort((a, b) => a.localeCompare(b, "zh-Hans-CN"));
      const recommended = [];
      const picked = new Set();
      const pick = (name, reason) => {
        if (picked.has(name) || recommended.length >= 8) return;
        picked.add(name);
        recommended.push({ name, reason });
      };

      nonGoldShapes.forEach(([name, stats]) => pick(name, `非金色 ${stats.total}`));
      for (let lineCount = 0; lineCount <= 4 && recommended.length < 8; lineCount += 1) {
        [...goldLineMap.entries()]
          .map(([name, counts]) => ({ name, count: counts[lineCount] || 0 }))
          .filter(item => item.count > 0)
          .sort((a, b) => b.count - a.count || a.name.localeCompare(b.name, "zh-Hans-CN"))
          .forEach(item => pick(item.name, `${lineCount}条有效属性 ${item.count}`));
      }

      const cultivationRows = allRoles.map(role => {
        const purpleMap = new Map();
        drivers(role).forEach(item => {
          if (item.quality !== "紫") return;
          purpleMap.set(item.name, (purpleMap.get(item.name) || 0) + (item.count || 1));
        });
        const needCurtain = role.curtain.missing || role.curtain.mainIssue;
        const items = [];
        if (needCurtain) {
          items.push(`空幕需替换${role.curtain.missing ? `（${role.curtain.name}暂缺）` : ""}${role.curtain.mainIssue ? `（${role.curtain.mainIssue}）` : ""}`);
        }
        if (purpleMap.size) {
          const purpleText = [...purpleMap.entries()]
            .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0], "zh-Hans-CN"))
            .map(([name, count]) => `${name} × ${count}`)
            .join("、");
          items.push(`紫色驱动：${purpleText}`);
        }
        return { role, items };
      }).filter(row => row.items.length > 0);

      document.getElementById("issuePanel").innerHTML = `
        <article class="issue-card">
          <h3>金色驱动有效属性统计</h3>
          <table class="matrix-table">
            <thead><tr><th>形状</th><th>0条</th><th>1条</th><th>2条</th><th>3条</th><th>4条</th></tr></thead>
            <tbody>
              ${goldLineShapes.length ? goldLineShapes.map(name => {
                const counts = goldLineMap.get(name) || [0, 0, 0, 0, 0];
                return `<tr><td>${name}</td>${counts.map(value => `<td class="${value ? "has-value" : ""}">${value || "-"}</td>`).join("")}</tr>`;
              }).join("") : `<tr><td colspan="6">当前没有记录金色驱动块。</td></tr>`}
            </tbody>
          </table>
        </article>
        <article class="issue-card">
          <h3>推荐指定的8种形状</h3>
          <ol class="recommend-list">
            ${recommended.map((item, index) => `<li><span><span class="rank-badge">${index + 1}</span> <b>${item.name}</b></span><span>${item.reason}</span></li>`).join("")}
          </ol>
        </article>
        <article class="issue-card">
          <h3>角色待培养内容</h3>
          <ul class="issue-list">
            ${cultivationRows.length ? cultivationRows.map(({ role, items }) => `<li><b>${role.name}</b>：${items.join("；")}</li>`).join("") : "<li>当前没有待培养项。</li>"}
          </ul>
        </article>
      `;
    }

    function renderDriverItem(item) {
      const qualityClass = item.quality === "金" ? "pill-gold" : item.quality === "紫" ? "pill-purple" : "pill-warn";
      return `
        <div class="driver-item">
          <div class="driver-main">
            <div class="driver-name">
              <span>${item.name}</span>
              <span class="pill ${qualityClass}">${item.quality || "未标"}</span>
              <span class="pill">${item.group}</span>
            </div>
          </div>
          ${item.lines && item.lines.length ? `<div class="driver-lines">${item.lines.map(line => `<span class="line-chip">${line}</span>`).join("")}</div>` : ""}
        </div>
      `;
    }

    function renderDriverGroup(title, items) {
      return `
        <div class="driver-group-title">${title}</div>
        <div class="driver-list">${items.map(item => renderDriverItem(item)).join("")}</div>
      `;
    }

    function renderRole(role) {
      const stats = qualityStats(role);
      const issue = hasIssue(role);
      const danger = Boolean(role.curtain.mainIssue);
      const transition = stats.purple > 0;
      const subs = role.curtain.subs && role.curtain.subs.length ? role.curtain.subs.join("、") : "待补充";
      const required = role.required.map(item => ({ ...item, group: "必备" }));
      const extra = role.extra.map(item => ({ ...item, group: "补充" }));
      return `
        <article class="role-card ${transition ? "has-transition" : ""} ${issue ? "has-warning" : ""} ${danger ? "has-danger" : ""}">
          <div class="role-top">
            <div class="role-title">
              <h3>${role.name}</h3>
              <div class="sub">${role.team} · Lv.${role.level}</div>

            <span class="pill ${attrClass[role.attr] || ""}">${role.attr}</span>
          </div>

          ${role.keyStats && role.keyStats.length ? `
            <div class="key-stats">
              ${role.keyStats.map(stat => `<div class="key-stat"><b>${stat.value}</b><span>${stat.label}</span></div>`).join("")}
            </div>
          ` : ""}

          <div class="info-grid">
            <div class="info-box">
              <h4>弧盘</h4>
              <ul class="list">
                <li><b>名称：</b>${role.arc.name}</li>
                <li><b>等级：</b>${role.arc.level}</li>
                <li><b>混频：</b>${role.arc.mix}</li>
              </ul>
            </div>
            <div class="info-box">
              <h4>空幕 ${role.curtain.missing ? `<span class="pill pill-warn">暂缺</span>` : ""}</h4>
              <ul class="list">
                <li><b>名称：</b>${role.curtain.name}</li>
                <li><b>等级：</b>${role.curtain.level}</li>
                <li><b>主属性：</b>${role.curtain.main} ${role.curtain.mainIssue ? `<span class="pill pill-danger">${role.curtain.mainIssue}</span>` : ""}</li>
                <li><b>副属性：</b>${subs}</li>
              </ul>
            </div>
          </div>

          <div class="driver-box">
            <div class="driver-title">
              <span>驱动块装配</span>
              ${statusPill(role)}
            </div>
            <div class="quality-grid">
              <div class="quality gold"><b>${stats.gold}</b><span>金色</span></div>
              <div class="quality purple"><b>${stats.purple}</b><span>紫色</span></div>
              <div class="quality missing"><b>${stats.missing}</b><span>暂缺</span></div>
              <div class="quality lines"><b>${stats.lines}</b><span>词条</span></div>
            </div>
            ${renderDriverGroup("必备", required)}
            ${renderDriverGroup("补充", extra)}
          </div>

          <div class="todo">
            <p class="todo-title">待补充</p>
            <div class="chip-row">${role.todo.map(item => `<span class="chip">${item}</span>`).join("")}</div>
          </div>
        </article>
      `;
    }

    function renderTeams() {
      teams.forEach(team => {
        document.getElementById(team.id).innerHTML = team.roles.map(role => renderRole({ ...role, team: team.name })).join("");
      });
    }

    renderStats();
    renderIssues();
    renderTeams();

    document.getElementById("onlyIssues").addEventListener("change", event => {
      document.getElementById("page").classList.toggle("hide-clean", event.target.checked);
    });
  </script>
</body>
</html>
